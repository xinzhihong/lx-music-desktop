name: Build All Platforms

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  IS_CI: 'true'

jobs:
  Windows_x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Check out lx-music-desktop
        uses: actions/checkout@v4
        with:
          repository: xinzhihong/lx-music-desktop

      - name: Checkout & Build KuGouMusicApi
        run: |
          git clone --depth 1 https://github.com/xinzhihong/KuGouMusicApi.git $env:GITHUB_WORKSPACE\..\KuGouMusicApi
          cd $env:GITHUB_WORKSPACE\..\KuGouMusicApi
          npm install
          npm run pkgwin
          Move-Item -Force bin\app_win bin\app.exe

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build src code
        run: |
          git status --porcelain
          npm run build

      - name: Build Setup x64
        run: npm run pack:win:setup:x64

      - name: Upload Setup x64
        uses: actions/upload-artifact@v4
        with:
          name: lx-music-desktop-x64-Setup
          path: build/*-x64-Setup.exe

      - name: Build 7z x64
        run: npm run pack:win:7z:x64

      - name: Upload 7z x64
        uses: actions/upload-artifact@v4
        with:
          name: lx-music-desktop-win_x64-green
          path: build/*win_x64-green.7z

  Windows_arm64:
    name: Windows arm64
    runs-on: windows-latest
    steps:
      - name: Check out lx-music-desktop
        uses: actions/checkout@v4
        with:
          repository: xinzhihong/lx-music-desktop

      - name: Checkout & Build KuGouMusicApi
        run: |
          git clone --depth 1 https://github.com/xinzhihong/KuGouMusicApi.git $env:GITHUB_WORKSPACE\..\KuGouMusicApi
          cd $env:GITHUB_WORKSPACE\..\KuGouMusicApi
          npm install
          npm run pkgwin
          Move-Item -Force bin\app_win bin\app.exe

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build src code
        run: |
          git status --porcelain
          npm run build

      - name: Build Setup arm64
        run: npm run pack:win:setup:arm64

      - name: Upload Setup arm64
        uses: actions/upload-artifact@v4
        with:
          name: lx-music-desktop-arm64-Setup
          path: build/*-arm64-Setup.exe

  Mac_x64:
    name: Mac x64
    runs-on: macos-latest
    steps:
      - name: Check out lx-music-desktop
        uses: actions/checkout@v4
        with:
          repository: xinzhihong/lx-music-desktop

      - name: Install python setuptools
        run: brew install python-setuptools

      - name: Checkout & Build KuGouMusicApi
        run: |
          cd ${{ github.workspace }}/..
          git clone --depth 1 https://github.com/xinzhihong/KuGouMusicApi.git KuGouMusicApi
          cd KuGouMusicApi
          npm install
          npm run pkgmacos

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build src code
        run: |
          git status --porcelain
          npm run build

      - name: Build DMG
        run: npm run pack:mac:dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: lx-music-desktop-mac-x64
          path: build/*.dmg

  Mac_arm64:
    name: Mac arm64
    runs-on: macos-latest
    steps:
      - name: Check out lx-music-desktop
        uses: actions/checkout@v4
        with:
          repository: xinzhihong/lx-music-desktop

      - name: Install python setuptools
        run: brew install python-setuptools

      - name: Checkout & Build KuGouMusicApi
        run: |
          cd ${{ github.workspace }}/..
          git clone --depth 1 https://github.com/xinzhihong/KuGouMusicApi.git KuGouMusicApi
          cd KuGouMusicApi
          npm install
          npm run pkgmacos-arm64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build src code
        run: |
          git status --porcelain
          npm run build

      - name: Build DMG arm64
        run: npm run pack:mac:dmg:arm64

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: lx-music-desktop-mac-arm64
          path: build/*.dmg
